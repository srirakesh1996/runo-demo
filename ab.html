<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bot Test Form</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body>
    <form id="contact-form">
      <input type="text" name="website" style="display: none" autocomplete="off" />
      <input type="text" name="your_name" placeholder="Your Name" />
      <input type="email" name="your_email" placeholder="Your Email" />
      <input type="text" name="your_phone" placeholder="Your Phone" />
      <button type="submit">Submit</button>
    </form>

    <script>
      $("#contact-form").on("submit", function (event) {
        event.preventDefault();

        // Honeypot check
        if ($("input[name='website']").val()) {
          console.warn("Bot detected via honeypot!");
          alert("Bot detected. Submission rejected.");
          return;
        }

        alert("Form submitted successfully!");
      });
    </script>
  </body>
</html>
