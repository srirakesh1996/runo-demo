<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- IMPORTANT: Prevent indexing -->
    <meta name="robots" content="noindex, nofollow" />

    <title>Download Runo App</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 40px;
        background: #f5f7fa;
      }
      .container {
        max-width: 600px;
        margin: auto;
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      h2 {
        margin-bottom: 10px;
      }
      .icons {
        margin-top: 20px;
      }
      .icons a {
        margin: 10px;
        display: inline-block;
      }
      .icons img {
        width: 60px;
      }
      .note {
        margin-top: 20px;
        color: #666;
      }
    </style>
    <script>
      function getUTMParams() {
        var params = new URLSearchParams(window.location.search);

        var utm_source = params.get("utm_source") || "";
        var utm_campaign = params.get("utm_campaign") || "";

        return "utm_source=" + encodeURIComponent(utm_source) + "&utm_campaign=" + encodeURIComponent(utm_campaign);
      }

      function redirectToStore() {
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;

        var isIOS = /iPad|iPhone|iPod/.test(userAgent);
        var isAndroid = /android/i.test(userAgent);

        var isTouchDevice = "ontouchstart" in window || navigator.maxTouchPoints > 0;
        var isSmallScreen = window.innerWidth <= 1024;

        var utmParams = getUTMParams();

        var finalIosUrl = "https://apps.apple.com/us/app/runo-outbound-call-center-crm/id1528004506?" + utmParams;

        var finalAndroidUrl = "https://play.google.com/store/apps/details?id=in.runo.call_crm&hl=en_IN&" + utmParams;

        document.getElementById("iosLink").href = finalIosUrl;
        document.getElementById("androidLink").href = finalAndroidUrl;

        var redirectUrl = null;

        if (isIOS || (isTouchDevice && isSmallScreen && /Mac/.test(userAgent))) {
          redirectUrl = finalIosUrl;
        } else if (isAndroid || (isTouchDevice && isSmallScreen)) {
          redirectUrl = finalAndroidUrl;
        }

        // Try store redirect
        if (redirectUrl) {
          window.location.href = redirectUrl;
        }

        // ALWAYS fallback → runo.ai after 5 sec
        setTimeout(function () {
          window.location.href = "https://runo.ai?" + utmParams;
        }, 7000);
      }

      window.onload = redirectToStore;
    </script>
    <!-- End Google Tag Manager -->
    <script>
      (function () {
        try {
          if (sessionStorage.getItem("lang_pending")) {
            document.documentElement.classList.add("lang-pending");
          }
        } catch (e) {}
      })();
    </script>

    <style>
      html.lang-pending .runo-preloader {
        display: flex !important;
        opacity: 1 !important;
        visibility: visible !important;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Download Runo App</h2>

      <p>You are being redirected to the correct app store...</p>

      <div class="icons">
        <a id="iosLink" href="#">
          <img src="img/app-ico.png" alt="Download on App Store" />
        </a>

        <a id="androidLink" href="#">
          <img src="img/play-ico.png" alt="Get it on Google Play" />
        </a>
      </div>

      <p class="note">If you are not redirected automatically, please select your device above.</p>
    </div>
    <!-- LANGUAGE SWITCHER -->
    <div class="rt-lang-wrapper notranslate" id="langWrapper" translate="no">
      <button type="button" class="rt-lang-btn notranslate" id="rt-lang-btn" aria-haspopup="listbox" aria-expanded="false" aria-controls="rt-lang-menu" translate="no">
        <span class="rt-lang-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.477 2 2 6.477 2 12C2 17.523 6.477 22 12 22C17.523 22 22 17.523 22 12C22 6.477 17.523 2 12 2Z" stroke="#ff5430" stroke-width="2" />
            <path d="M2 12H22" stroke="#ff5430" stroke-width="2" stroke-linecap="round" />
            <path d="M12 2C14.5 4.7 16 8.2 16 12C16 15.8 14.5 19.3 12 22" stroke="#ff5430" stroke-width="2" stroke-linecap="round" />
            <path d="M12 2C9.5 4.7 8 8.2 8 12C8 15.8 9.5 19.3 12 22" stroke="#ff5430" stroke-width="2" stroke-linecap="round" />
          </svg>
        </span>
      </button>

      <div class="rt-lang-menu notranslate" id="rt-lang-menu" role="listbox" aria-label="Select language" translate="no">
        <button type="button" class="rt-lang-item notranslate" data-lang="en" translate="no">English</button>
        <button type="button" class="rt-lang-item notranslate" data-lang="es" translate="no">Spanish</button>
        <button type="button" class="rt-lang-item notranslate" data-lang="fr" translate="no">French</button>
        <button type="button" class="rt-lang-item notranslate" data-lang="pt" translate="no">Portuguese</button>
        <button type="button" class="rt-lang-item notranslate" data-lang="de" translate="no">German</button>
        <button type="button" class="rt-lang-item notranslate" data-lang="ru" translate="no">Russian</button>
        <button type="button" class="rt-lang-item notranslate" data-lang="it" translate="no">Italian</button>
        <button type="button" class="rt-lang-item notranslate" data-lang="nl" translate="no">Dutch</button>
        <button type="button" class="rt-lang-item notranslate" data-lang="pl" translate="no">Polish</button>
      </div>
    </div>

    <div id="google_translate_element" class="notranslate" translate="no"></div>
    <div id="langOverlay" aria-hidden="true"></div>
    <style>
      #langOverlay {
        position: fixed;
        inset: 0;
        background: #fff;
        z-index: 9999999;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 0.5s ease,
          visibility 0.5s ease;
      }
      html.lang-translating,
      html.lang-translating body {
        overflow: hidden !important;
      }
      #langOverlay.active,
      html.lang-translating #langOverlay {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .rt-lang-wrapper {
        position: fixed;
        top: 14px;
        right: 20px;
        z-index: 2147483647;
        font-family: Inter, Arial, sans-serif;
      }

      .rt-lang-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        padding: 0;
        min-width: 44px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 9999px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(243, 246, 250, 0.96));
        box-shadow:
          0 12px 28px rgba(15, 23, 42, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        color: #0f172a;
        cursor: pointer;
        outline: none;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
        -webkit-tap-highlight-color: transparent;
      }

      .rt-lang-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(100, 116, 139, 0.5);
        box-shadow:
          0 16px 34px rgba(15, 23, 42, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.98);
      }

      .rt-lang-btn:focus-visible {
        border-color: rgba(59, 130, 246, 0.55);
        box-shadow:
          0 0 0 4px rgba(59, 130, 246, 0.12),
          0 16px 34px rgba(15, 23, 42, 0.16);
      }

      .rt-lang-icon {
        width: 26px;
        height: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        background: rgba(59, 130, 246, 0.1);
        font-size: 15px;
        flex: 0 0 auto;
      }

      .rt-lang-menu {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        width: 100%;
        min-width: 190px;
        margin-top: 12px;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 18px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.16);
        padding: 8px;
        display: none;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        max-height: 300px;
        overflow: auto;
      }

      .rt-lang-wrapper.open .rt-lang-menu {
        display: block;
        animation: rtFadeIn 0.16s ease-out;
      }

      @keyframes rtFadeIn {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .rt-lang-item {
        width: 100%;
        text-align: left;
        border: 0;
        background: transparent;
        color: #0f172a;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 8px;
        border-radius: 12px;
        cursor: pointer;
        transition:
          background 0.15s ease,
          transform 0.15s ease;
      }

      .rt-lang-item:hover {
        background: #eff6ff;
      }

      .rt-lang-item.active {
        background: #ff5430;
        color: #fff;
      }

      .rt-lang-item:active {
        transform: scale(0.99);
      }

      @media (max-width: 991px) {
        .rt-lang-wrapper {
          top: 17px;
          right: 70px;
        }

        .rt-lang-btn {
          width: 42px;
          height: 42px;
          min-width: 42px;
        }

        .rt-lang-menu {
          min-width: 190px;
          right: 0;
        }
      }

      @media (max-width: 420px) {
        .rt-lang-wrapper {
          right: 62px;
        }
      }

      /* Hide translate bar completely */
      .skiptranslate,
      .goog-te-banner-frame,
      iframe.goog-te-banner-frame,
      .goog-te-balloon-frame {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        height: 0 !important;
        width: 0 !important;
        border: 0 !important;
      }

      /* Prevent translate wrapper from affecting layout */
      body > .skiptranslate {
        display: none !important;
      }

      /* Extra fix for newer Google classes */
      .VIpgJd-ZVi9od-ORHb-OEVmcd,
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf,
      .VIpgJd-ZVi9od-aZ2wEe,
      .VIpgJd-yAWNEb-L7lbkb {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        height: 0 !important;
        width: 0 !important;
      }

      /* Prevent page jump */
      iframe {
        max-width: 100%;
      }
    </style>
    <script>
      (function () {
        "use strict";

        const STORAGE_KEY = "selected_lang";
        const BASE_LANG = "en";

        const wrapper = document.getElementById("langWrapper");
        const btn = document.getElementById("rt-lang-btn");
        const items = Array.from(document.querySelectorAll(".rt-lang-item"));

        const langNames = {
          en: "English",
          es: "Spanish",
          fr: "French",
          pt: "Portuguese",
          de: "German",
          ru: "Russian",
          it: "Italian",
          nl: "Dutch",
          pl: "Polish"
        };

        let languageSwitchRequestId = 0;

        function getSavedLang() {
          try {
            return localStorage.getItem(STORAGE_KEY) || BASE_LANG;
          } catch (e) {
            return BASE_LANG;
          }
        }

        function setGoogleCookie(lang) {
          const cookie = `googtrans=/${BASE_LANG}/${lang}; path=/; SameSite=Lax`;
          document.cookie = cookie;

          const host = location.hostname.replace(/^www\./, "");
          if (host && host !== "localhost" && host.includes(".")) {
            document.cookie = `${cookie}; domain=.${host}`;
          }
        }

        function hideGoogleUI() {
          document.body.style.top = "0px";
          document.documentElement.style.top = "0px";
          document.body.style.marginTop = "0px";
          document.documentElement.style.marginTop = "0px";
          document.body.style.paddingTop = "0px";
          document.documentElement.style.paddingTop = "0px";
          document.body.style.position = "static";
          document.documentElement.style.position = "static";

          const banner = document.querySelector(".goog-te-banner-frame");
          if (banner) banner.style.display = "none";

          const skip = document.querySelector(".skiptranslate");
          if (skip) skip.style.display = "none";
        }

        function updateUI(lang) {
          items.forEach((item) => {
            item.classList.toggle("active", item.dataset.lang === lang);
          });
        }

        function closeMenu() {
          wrapper.classList.remove("open");
          btn.setAttribute("aria-expanded", "false");
        }

        function openMenu() {
          wrapper.classList.add("open");
          btn.setAttribute("aria-expanded", "true");
        }

        function waitForCombo(callback, maxTries = 100, delay = 100) {
          let tries = 0;

          const timer = setInterval(() => {
            const combo = document.querySelector(".goog-te-combo");
            if (combo) {
              clearInterval(timer);
              callback(combo);
              return;
            }

            tries += 1;
            if (tries >= maxTries) {
              clearInterval(timer);
              callback(null);
            }
          }, delay);
        }

        function showPreloaderUntilReady() {
          try {
            sessionStorage.setItem("lang_pending", "1");
          } catch (e) {}

          document.documentElement.classList.add("lang-pending");
        }

        function hidePreloaderWhenDone() {
          document.documentElement.classList.remove("lang-pending");
          try {
            sessionStorage.removeItem("lang_pending");
          } catch (e) {}
        }

        function setLanguage(lang) {
          const finalLang = langNames[lang] ? lang : BASE_LANG;
          const requestId = ++languageSwitchRequestId;

          try {
            localStorage.setItem(STORAGE_KEY, finalLang);
          } catch (e) {}

          setGoogleCookie(finalLang);
          updateUI(finalLang);
          closeMenu();
          showPreloaderUntilReady();

          // Reload once; the pending flag keeps the preloader visible
          window.location.reload();
        }

        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          wrapper.classList.contains("open") ? closeMenu() : openMenu();
        });

        items.forEach((item) => {
          item.addEventListener("click", () => {
            setLanguage(item.dataset.lang);
          });
        });

        document.addEventListener("click", (e) => {
          if (!wrapper.contains(e.target)) closeMenu();
        });

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeMenu();
        });

        window.addEventListener("load", () => {
          hideGoogleUI();

          const savedLang = getSavedLang();
          updateUI(savedLang);
          setGoogleCookie(savedLang);

          const pending = (() => {
            try {
              return sessionStorage.getItem("lang_pending") === "1";
            } catch (e) {
              return false;
            }
          })();

          if (pending) {
            document.documentElement.classList.add("lang-pending");

            waitForCombo((combo) => {
              if (!combo) {
                hidePreloaderWhenDone();
                return;
              }

              try {
                if (savedLang !== BASE_LANG) {
                  combo.value = savedLang;
                  combo.dispatchEvent(new Event("change", {bubbles: true}));
                  combo.dispatchEvent(new Event("input", {bubbles: true}));
                }

                setTimeout(() => {
                  hideGoogleUI();
                  hidePreloaderWhenDone();
                }, 1200);
              } catch (err) {
                hidePreloaderWhenDone();
              }
            });
          } else {
            // If nothing is pending, let your existing preloader hide normally.
            setTimeout(hideGoogleUI, 300);
            setTimeout(hideGoogleUI, 1200);
          }
        });

        const observer = new MutationObserver(() => {
          hideGoogleUI();
        });

        observer.observe(document.body, {
          childList: true
        });

        window.__rtHideGoogleUI = hideGoogleUI;

        setInterval(() => {
          hideGoogleUI();
        }, 600);
      })();

      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            autoDisplay: false,
            includedLanguages: "en,es,fr,pt,de,ru,it,nl,pl"
          },
          "google_translate_element"
        );
      }
    </script>

    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
